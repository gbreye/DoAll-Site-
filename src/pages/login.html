<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <title>Login</title>
</head>
<body>
    <section class="login-section">
        <div class="login-container">
            <h2>SignUp to DoAll.</h2>
            <form id="login-form">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" autocomplete="email" required placeholder="name@example.com">

                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
                
                    <button type="submit">Sign In</button>
  
                
            </form>
        </div>
        <script src="../js/login.js"></script>
</body>
</html>
